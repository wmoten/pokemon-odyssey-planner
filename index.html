<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon Odyssey Team Planner</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/styles.css?v=team-builder-filters" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Pokemon Odyssey v4.1.1</p>
          <h1>Team Planner</h1>
        </div>
        <div class="topbar-actions">
          <label class="toggle-row">
            <input id="spoiler-toggle" type="checkbox" checked />
            <span>Spoiler-safe locations</span>
          </label>
          <button id="reset-filters" class="ghost-button" type="button">Reset filters</button>
        </div>
      </header>

      <section class="team-dock" aria-label="Team builder">
        <div class="team-header">
          <div>
            <p class="eyebrow">Saved teams</p>
            <div class="team-title-row">
              <select id="team-select" class="select-input compact"></select>
              <button id="new-team" class="icon-button" type="button" title="New team">+</button>
              <button id="rename-team" class="icon-button" type="button" title="Rename team">Aa</button>
              <button id="delete-team" class="icon-button danger" type="button" title="Delete team">×</button>
            </div>
          </div>
          <div id="team-analysis" class="team-analysis"></div>
        </div>
        <div id="team-slots" class="team-slots"></div>
        <div id="team-defense" class="team-defense"></div>
      </section>

      <main class="layout">
        <aside class="filter-panel" aria-label="Search and filters">
          <section class="panel-section">
            <label class="field-label" for="search-input">Search</label>
            <input id="search-input" class="search-input" type="search" placeholder="Name, move, ability, role, location" />
          </section>

          <details class="panel-section filter-details" open>
            <summary>Available by</summary>
            <div id="phase-filters" class="segmented"></div>
            <div id="source-filters" class="segmented availability-source-filters"></div>
          </details>

          <details class="panel-section filter-details" open>
            <summary>Types</summary>
            <div id="type-filters" class="chip-grid"></div>
          </details>

          <details class="panel-section filter-details">
            <summary>Defensive matchups</summary>
            <div class="filter-subheading">Weak to</div>
            <div id="weakness-filters" class="defense-filter-list"></div>
            <div class="filter-subheading spaced">Resists or immune to</div>
            <div id="resist-filters" class="defense-filter-list"></div>
          </details>

          <details class="panel-section filter-details">
            <summary>Abilities</summary>
            <input id="ability-filter-search" class="search-input small-filter-search" type="search" placeholder="Find an ability" />
            <div id="ability-filters" class="ability-filter-list"></div>
          </details>

          <details class="panel-section filter-details" open>
            <summary>Roles</summary>
            <div id="role-filters" class="role-list"></div>
          </details>

          <details class="panel-section filter-details" open>
            <summary>Stat profile</summary>
            <select id="archetype-filter" class="select-input"></select>
          </details>

          <details class="panel-section filter-details">
            <summary>Evolution stage</summary>
            <div id="evolution-filters" class="evolution-filter-list"></div>
          </details>

        </aside>

        <section class="dex-panel" aria-label="Pokemon browser">
          <div class="results-toolbar">
            <div>
              <strong id="result-count">0 results</strong>
              <span id="active-filter-copy"></span>
            </div>
            <div class="results-actions">
              <label class="sort-control" for="sort-select">
                <span>Sort</span>
                <select id="sort-select" class="select-input compact">
                  <option value="availability">Earliest availability</option>
                  <option value="dex">Game dex</option>
                  <option value="bst">Base stat total</option>
                  <option value="buff">Largest Odyssey buff</option>
                  <optgroup label="Stats">
                    <option value="stat:hp">HP</option>
                    <option value="stat:atk">Attack</option>
                    <option value="stat:def">Defense</option>
                    <option value="stat:spa">Sp. Atk</option>
                    <option value="stat:spd">Sp. Def</option>
                    <option value="stat:spe">Speed</option>
                  </optgroup>
                  <option value="name">Name</option>
                </select>
              </label>
              <button id="add-selected" class="primary-button" type="button">Add selected</button>
            </div>
          </div>

          <div id="pokemon-grid" class="pokemon-grid" aria-live="polite"></div>
        </section>

        <aside class="detail-panel" aria-label="Pokemon details">
          <div id="detail-content" class="detail-content"></div>
        </aside>
      </main>

    </div>

    <div id="mobile-detail-modal" class="mobile-detail-modal" aria-hidden="true">
      <div class="mobile-detail-backdrop" data-mobile-detail-close></div>
      <section class="mobile-detail-frame" role="dialog" aria-modal="true" aria-label="Pokemon details">
        <header class="mobile-detail-topbar">
          <div>
            <p class="eyebrow">Inspect</p>
            <strong id="mobile-detail-title">Pokemon details</strong>
          </div>
          <button id="mobile-detail-close" class="icon-button" type="button" title="Close details">×</button>
        </header>
        <div id="mobile-detail-content" class="mobile-detail-content detail-content"></div>
      </section>
    </div>

    <div id="ability-popover" class="ability-popover" aria-hidden="true">
      <section class="ability-popover-card" role="dialog" aria-label="Ability details">
        <div>
          <p class="eyebrow">Ability</p>
          <strong id="ability-popover-title"></strong>
          <p id="ability-popover-text"></p>
        </div>
        <button id="ability-popover-close" class="icon-button" type="button" title="Close ability details">×</button>
      </section>
    </div>

    <script type="module" src="src/app.js?v=team-builder-filters"></script>
  </body>
</html>
